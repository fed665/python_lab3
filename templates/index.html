<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чек-лист задач</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            font-size: 24px;
        }
        .add-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .add-form input {
            flex: 1;
            padding: 8px;
            font-size: 16px;
        }
        .add-form button {
            padding: 8px 16px;
            font-size: 16px;
        }
        .task {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #ccc;
        }
        .task-title {
            flex: 1;
        }
        .completed {
            text-decoration: line-through;
            color: gray;
        }
        .delete-btn {
            color: red;
            text-decoration: none;
        }
        .stats {
            margin-top: 20px;
            font-size: 14px;
            color: gray;
        }
        .empty {
            color: gray;
        }
    </style>
</head>
<body>
    <h1>📝 Чек-лист задач</h1>

    <form method="POST" action="/add" class="add-form">
        <input type="text" name="title" placeholder="Новая задача..." required>
        <button type="submit">Добавить</button>
    </form>

    {% if tasks %}
        {% for task in tasks %}
        <div class="task">
            <a href="/toggle/{{ task.id }}" style="text-decoration: none;">
                <input type="checkbox" {% if task.completed %}checked{% endif %}
                       onchange="window.location.href='/toggle/{{ task.id }}'">
            </a>
            <span class="task-title {% if task.completed %}completed{% endif %}">
                {{ task.title }}
            </span>
            <a href="/delete/{{ task.id }}" class="delete-btn"
               onclick="return confirm('Удалить задачу?')">✖</a>
        </div>
        {% endfor %}
    {% else %}
        <div class="empty">Нет задач. Добавьте первую задачу.</div>
    {% endif %}

    <div class="stats">
        {% set total = tasks|length %}
        {% set completed = tasks|selectattr('completed')|list|length %}
        Выполнено: {{ completed }} из {{ total }}
    </div>
</body>
</html>
